# Dependabot keeps dependencies patched on the default branch (main).
# Grouped minor/patch bumps to keep PR volume low; majors come as individual PRs.
version: 2
updates:
  # Controller (Next.js / Node)
  - package-ecosystem: npm
    directory: /controller
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # eslint 10 is upstream-blocked (eslint-plugin-react has no v10 release and
    # Next's bundled babel eslint-parser lacks ESLint 10's
    # scopeManager.addGlobals API). Stay on eslint 9 until that support lands.
    ignore:
      - dependency-name: "eslint"
        versions: [">=10"]
    groups:
      controller-minor-patch:
        update-types:
          - minor
          - patch
      # eslint and eslint-config-next are peer-locked; bump them together.
      eslint:
        patterns:
          - "eslint"
          - "eslint-config-next"
        update-types:
          - major
          - minor
          - patch

  # Agent (Python / pyproject.toml)
  - package-ecosystem: pip
    directory: /agent
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      agent-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        update-types:
          - minor
          - patch

  # Container base images
  - package-ecosystem: docker
    directories:
      - /controller
      - /image
    schedule:
      interval: weekly
    # The lab image base (ubuntu) is deliberately pinned to the 24.04 LTS line;
    # test_image_contract asserts ubuntu:24.04@sha256:. Do not offer major LTS
    # bumps (e.g. 26.04) — they break the pinned-base contract. Digest/patch
    # updates within 24.04 are still allowed.
    ignore:
      - dependency-name: "ubuntu"
        update-types: ["version-update:semver-major"]
