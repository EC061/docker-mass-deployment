name: CI

on:
  push:
    branches: [main, "rewrite/**"]
  pull_request:

jobs:
  agent:
    name: Agent (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install
        run: uv venv && uv pip install -e ".[dev]"
      - name: Ruff
        run: uv run ruff check src tests
      - name: Pytest
        run: uv run pytest -q

  controller:
    name: Controller (eslint + tsc + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: controller
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: controller/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
