name: CI

on:
  push:
    branches: [main, "rewrite/**"]
  pull_request:

jobs:
  agent:
    name: Agent (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Install
        run: uv venv && uv pip install -e ".[dev]"
      - name: Ruff
        run: uv run ruff check src tests
      - name: Pytest
        run: uv run pytest -q

  controller:
    name: Controller (eslint + tsc + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: controller
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: controller/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  lab-image:
    name: Lab image + AppArmor policy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Parse AppArmor policy
        run: sudo apparmor_parser -Q -T agent/src/lab_agent/assets/lab-codex.apparmor
      - name: Build pinned lab image
        run: docker build --tag custom-ssh:ci image
      - name: Verify CUDA toolkit and bubblewrap
        run: |
          docker run --rm --entrypoint sh custom-ssh:ci -c '
            nvcc --version
            ! command -v node
            ! command -v npm
            ! command -v codex
            test "$(stat -c %U:%G /usr/bin/bwrap)" = root:root
            test "$(stat -c %a /usr/bin/bwrap)" = 4755
            useradd -m -s /bin/bash student
          '
          output=$(docker run --rm \
            --cap-add SYS_ADMIN --cap-add NET_ADMIN --cap-add SYS_PTRACE \
            --security-opt "seccomp=$PWD/agent/src/lab_agent/assets/lab-codex-seccomp.json" \
            --security-opt apparmor=unconfined --security-opt systempaths=unconfined \
            --entrypoint sh custom-ssh:ci -c '
              useradd -m -s /bin/bash student
              su - student -c '\''bwrap --ro-bind / / --dev /dev --proc /proc --unshare-pid -- echo "bwrap works"'\''
            ')
          test "$output" = "bwrap works"
          '
