# One-command bring-up for the controller. The agents are installed per-node with `lab-agent install`
# (see README "Node host prep"); they are NOT part of this compose file.

services:
  controller:
    build: ./controller
    # For production, pin to an immutable released image rather than :latest (M-09), e.g.
    #   image: ghcr.io/ec061/lab-controller@sha256:<digest>
    # (copy the digest CI prints for the tag you intend to run).
    image: ghcr.io/ec061/lab-controller:latest
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      DB_PATH: /app/data/controller.db
      PORT: "8443"
      SIGNUP_TOKEN: ${SIGNUP_TOKEN:?set SIGNUP_TOKEN}
      AGENT_TOKEN: ${AGENT_TOKEN:?set AGENT_TOKEN}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET}
      # Public domain the controller is reached at: EXACTLY ONE bare hostname (no scheme/port/path/
      # wildcard/comma), e.g. lab.edwardcheng.net. Required when a reverse proxy terminates TLS in
      # front of the controller, otherwise Server Action requests fail their CSRF/origin check. The
      # browser Origin and agent WebSocket host are also validated against it. "" → same-origin.
      CONTROLLER_DOMAIN: ${CONTROLLER_DOMAIN:-}
      NODE_ENV: production
    volumes:
      - controller-data:/app/data

volumes:
  controller-data:
